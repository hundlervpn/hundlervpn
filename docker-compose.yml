version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hundler-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:-http://localhost:3000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OXAPAY_API_KEY: ${OXAPAY_API_KEY}
      POSTGRESQL_HOST: ${POSTGRESQL_HOST}
      POSTGRESQL_PORT: ${POSTGRESQL_PORT:-5432}
      POSTGRESQL_USER: ${POSTGRESQL_USER}
      POSTGRESQL_PASSWORD: ${POSTGRESQL_PASSWORD}
      POSTGRESQL_DBNAME: ${POSTGRESQL_DBNAME}
      POSTGRESQL_SSL_MODE: ${POSTGRESQL_SSL_MODE:-disable}
      POSTGRESQL_SSL_CA_PATH: ${POSTGRESQL_SSL_CA_PATH:-}
      XRAY_VLESS_HOST: ${XRAY_VLESS_HOST:-}
      XRAY_VLESS_PORT: ${XRAY_VLESS_PORT:-443}
      XRAY_REALITY_PUBLIC_KEY: ${XRAY_REALITY_PUBLIC_KEY:-}
      XRAY_REALITY_SNI: ${XRAY_REALITY_SNI:-}
      XRAY_REALITY_SHORT_ID: ${XRAY_REALITY_SHORT_ID:-}
      XRAY_REALITY_FINGERPRINT: ${XRAY_REALITY_FINGERPRINT:-chrome}
      XRAY_VLESS_FLOW: ${XRAY_VLESS_FLOW:-xtls-rprx-vision}
      XRAY_VLESS_REMARK: ${XRAY_VLESS_REMARK:-HundlerVPN}
      XRAY_SYNC_TOKEN: ${XRAY_SYNC_TOKEN:-}
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-hundlervpn_bot}
